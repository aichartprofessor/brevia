<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brevia — AI 비서</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d;--paper:#f5f2eb;--accent:#1a472a;--accent-light:#2d6a4f;
  --muted:#6b6b6b;--border:rgba(13,13,13,0.1);--white:#fff;
  --serif:'Instrument Serif',Georgia,serif;--sans:'Pretendard',-apple-system,sans-serif;
}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(245,242,235,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:var(--serif);font-size:20px;letter-spacing:-0.5px}
.logo em{color:var(--accent);font-style:italic}
.mode-toggle{display:flex;gap:4px;background:rgba(0,0,0,0.06);padding:4px;border-radius:100px}
.mode-btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:7px 16px;border-radius:100px;border:none;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--muted)}
.mode-btn.active{background:var(--ink);color:var(--paper)}
.plan-badge{font-size:11px;font-weight:500;color:var(--accent);border:1px solid rgba(26,71,42,0.3);padding:4px 10px;border-radius:100px}

/* MAIN LAYOUT */
main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
aside{width:220px;border-right:1px solid var(--border);background:var(--white);padding:20px 16px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;overflow-y:auto}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:12px 0 6px 8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:400;color:var(--ink);transition:background 0.15s;border:none;background:transparent;width:100%;text-align:left}
.sidebar-item:hover{background:rgba(0,0,0,0.05)}
.sidebar-item.active{background:rgba(26,71,42,0.1);color:var(--accent);font-weight:500}
.sidebar-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;flex-shrink:0}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:16px}

.msg{display:flex;gap:12px;animation:fadeUp 0.3s ease both}
.msg.user{flex-direction:row-reverse}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:600}
.avatar.ai{background:var(--ink);color:var(--paper);font-family:var(--serif);font-style:italic}
.avatar.user{background:var(--accent);color:white}

.bubble{max-width:72%;padding:13px 16px;border-radius:16px;font-size:14px;line-height:1.65}
.bubble.ai{background:var(--white);border:1px solid var(--border);border-bottom-left-radius:4px}
.bubble.user{background:var(--ink);color:var(--paper);border-bottom-right-radius:4px}
.bubble-label{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}

.typing{display:flex;gap:4px;align-items:center;padding:6px 0}
.dot-t{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s ease-in-out infinite}
.dot-t:nth-child(2){animation-delay:0.2s}
.dot-t:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}

/* INPUT */
.chat-input-area{padding:16px 28px 20px;border-top:1px solid var(--border);background:rgba(245,242,235,0.8);flex-shrink:0}
.input-box{display:flex;gap:10px;align-items:flex-end;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:10px 12px;transition:border-color 0.2s}
.input-box:focus-within{border-color:var(--accent)}
textarea{flex:1;font-family:var(--sans);font-size:14px;border:none;outline:none;background:transparent;resize:none;max-height:120px;min-height:22px;line-height:1.5;color:var(--ink)}
textarea::placeholder{color:#bbb}
.send-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--ink);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.send-btn:hover{background:var(--accent)}
.send-btn:disabled{background:#ccc;cursor:not-allowed}
.send-btn svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2}

/* 빠른 프롬프트 */
.quick-prompts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qp{font-size:12px;font-weight:400;padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--muted);transition:all 0.15s;white-space:nowrap}
.qp:hover{border-color:var(--accent);color:var(--accent)}

/* 빈 상태 */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted)}
.empty-state .big{font-family:var(--serif);font-size:36px;font-style:italic;color:var(--ink);opacity:0.15}
.empty-state p{font-size:14px;font-weight:300}

/* 새 대화 버튼 */
.new-chat-btn{display:flex;align-items:center;gap:7px;width:100%;padding:9px 12px;border-radius:10px;border:1px dashed var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--muted);transition:all 0.15s;margin-bottom:4px}
.new-chat-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(26,71,42,0.04)}
.new-chat-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}

/* 대화 세션 목록 */
.session-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--muted);transition:background 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:none;background:transparent;width:100%;text-align:left}
.session-item:hover{background:rgba(0,0,0,0.04);color:var(--ink)}
.session-item.active{background:rgba(26,71,42,0.08);color:var(--accent)}
.session-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:0.5}

/* 토큰 카운터 */
.token-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-top:auto;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.token-count{font-weight:500;color:var(--ink)}
</style>
</head>
<body>

<header>
  <a href="brevia-dashboard.html" style="text-decoration:none"><span class="logo">Brev<em>ia</em></span></a>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('work')">💼 업무</button>
    <button class="mode-btn" onclick="setMode('invest')">📈 투자</button>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="brevia-dashboard.html" style="font-size:12px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px">
      <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      대시보드
    </a>
    <span class="plan-badge">Pro</span>
  </div>
</header>

<main>
  <aside>
    <button class="new-chat-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      새 대화
    </button>

    <div id="sessionList"></div>

    <div class="sidebar-label">업무 모드</div>
    <button class="sidebar-item active" onclick="setPrompt('meeting')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      회의록 요약
    </button>
    <button class="sidebar-item" onclick="setPrompt('email')">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      이메일 작성
    </button>
    <button class="sidebar-item" onclick="setPrompt('report')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><polyline points="14 2 14 8 20 8"/></svg>
      보고서 작성
    </button>

    <div class="sidebar-label">투자 모드</div>
    <button class="sidebar-item" onclick="setPrompt('stock')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      종목 분석
    </button>
    <button class="sidebar-item" onclick="setPrompt('news')">
      <svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6z"/></svg>
      뉴스 브리핑
    </button>
    <button class="sidebar-item" onclick="setPrompt('earnings')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      실적 요약
    </button>
    <div class="token-bar">
      <span>이번 대화</span>
      <span class="token-count" id="tokenCount">0 turns</span>
    </div>
  </aside>

  <div class="chat-area">
    <div class="chat-messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="big">Brevia</div>
        <p>아래에서 기능을 선택하거나 직접 입력하세요</p>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="quick-prompts" id="quickPrompts">
        <button class="qp" onclick="usePrompt('회의록을 붙여넣으면 요약해드릴게요. 회의 내용을 입력해주세요.')">📋 회의록 요약</button>
        <button class="qp" onclick="usePrompt('NVDA 최근 실적과 투자 포인트를 분석해줘')">📈 NVDA 분석</button>
        <button class="qp" onclick="usePrompt('오늘 미국 시장 주요 뉴스 브리핑해줘')">📰 오늘의 브리핑</button>
        <button class="qp" onclick="usePrompt('팀장에게 보내는 주간보고 이메일 초안 작성해줘')">✉️ 주간보고 이메일</button>
      </div>
      <div class="input-box">
        <textarea id="userInput" placeholder="메시지를 입력하세요..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</main>

<script>
let currentMode = 'work';
let isLoading = false;

// 멀티턴 핵심: 대화 히스토리 배열
let conversations = {}; // sessionId -> { title, mode, messages: [{role, content}] }
let currentSessionId = null;

const systemPrompts = {
  work: `당신은 Brevia의 업무 AI 비서입니다. 한국 직장인을 위해 회의록 요약, 이메일 작성, 보고서 작성을 도와줍니다.
회의록 요약 시: 결정사항, 액션아이템, 담당자를 명확히 구분해서 정리하세요.
이메일 작성 시: 한국 직장 문화에 맞는 격식체로 작성하세요.
답변은 간결하고 실용적으로, 마크다운 형식으로 작성하세요.`,
  invest: `당신은 Brevia의 투자 AI 비서입니다. 해외주식(주로 미국 시장)에 관심 있는 한국 투자자를 돕습니다.
종목 분석 시: 핵심 투자 포인트, 리스크, 최근 실적 동향을 한국어로 요약하세요.
뉴스 브리핑 시: 시장에 영향을 줄 핵심 뉴스만 선별해서 간결하게 정리하세요.
투자 권유는 삼가고, 정보 제공과 분석에 집중하세요. 마크다운 형식으로 답변하세요.`
};

// 새 세션 생성
function newChat() {
  const id = 'session_' + Date.now();
  conversations[id] = { title: '새 대화', mode: currentMode, messages: [] };
  currentSessionId = id;
  clearChatUI();
  updateSessionList();
  updateTokenCount();
  document.getElementById('userInput').focus();
}

// 세션 전환
function switchSession(id) {
  currentSessionId = id;
  const sess = conversations[id];
  currentMode = sess.mode;
  updateModeUI();
  clearChatUI();
  // 히스토리 UI 복원
  sess.messages.forEach(m => renderMessage(m.role, m.content, false));
  updateSessionList();
  updateTokenCount();
}

function clearChatUI() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `<div class="empty-state" id="emptyState">
    <div class="big">Brevia</div>
    <p>아래에서 기능을 선택하거나 직접 입력하세요</p>
  </div>`;
}

function updateSessionList() {
  const list = document.getElementById('sessionList');
  const ids = Object.keys(conversations).reverse();
  if (ids.length === 0) { list.innerHTML = ''; return; }

  list.innerHTML = ids.map(id => {
    const sess = conversations[id];
    const icon = sess.mode === 'work' ? '💼' : '📈';
    const active = id === currentSessionId ? ' active' : '';
    return `<button class="session-item${active}" onclick="switchSession('${id}')">
      <span class="session-dot"></span>${icon} ${sess.title}
    </button>`;
  }).join('');
}

function updateTokenCount() {
  const sess = conversations[currentSessionId];
  const turns = sess ? Math.floor(sess.messages.length / 2) : 0;
  document.getElementById('tokenCount').textContent = `${turns} turns`;
}

function setMode(mode) {
  currentMode = mode;
  if (currentSessionId) conversations[currentSessionId].mode = mode;
  updateModeUI();
}

function updateModeUI() {
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (currentMode === 'work' && i === 0) || (currentMode === 'invest' && i === 1));
  });
}

function setPrompt(type) {
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if (!currentSessionId) newChat();
  const prompts = {
    meeting: '회의록을 아래에 붙여넣어주세요. 결정사항, 액션아이템, 담당자로 정리해드릴게요.',
    email: '어떤 내용의 이메일을 작성할까요? (수신인, 목적, 핵심 내용을 알려주세요)',
    report: '어떤 주제의 보고서가 필요하신가요? 키워드나 개요를 알려주세요.',
    stock: '분석할 종목의 티커를 알려주세요. (예: NVDA, AAPL, TSLA)',
    news: '오늘 미국 시장 주요 뉴스와 투자자가 주목할 포인트를 브리핑해드릴게요.',
    earnings: '실적을 확인할 종목의 티커와 분기를 알려주세요.'
  };
  renderMessage('ai', prompts[type], false);
  document.getElementById('userInput').focus();
}

function usePrompt(text) {
  document.getElementById('userInput').value = text;
  autoResize(document.getElementById('userInput'));
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// UI에만 메시지 렌더링 (히스토리에 추가하지 않음)
function renderMessage(role, content, animate = true) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animation = 'none';

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? 'B' : '나';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  if (role === 'ai') {
    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = currentMode === 'work' ? '💼 Brevia 업무' : '📈 Brevia 투자';
    bubble.appendChild(label);
  }

  const text = document.createElement('div');
  text.style.whiteSpace = 'pre-wrap';
  text.innerHTML = formatMarkdown(content);
  bubble.appendChild(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function formatMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm, '<strong style="font-size:15px">$1</strong>')
    .replace(/^- (.+)$/gm, '&bull; $1')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar ai">B</div>
    <div class="bubble ai"><div class="typing"><div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  // 세션 없으면 자동 생성
  if (!currentSessionId) newChat();

  const sess = conversations[currentSessionId];

  // 유저 메시지 히스토리에 추가
  sess.messages.push({ role: 'user', content: text });

  // 첫 메시지면 제목으로 사용
  if (sess.messages.length === 1) {
    sess.title = text.length > 18 ? text.slice(0, 18) + '…' : text;
    updateSessionList();
  }

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  renderMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompts[currentMode],
        messages: sess.messages
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.[0]?.text || '응답을 받지 못했어요.';

    // AI 응답도 히스토리에 추가
    sess.messages.push({ role: 'assistant', content: reply });
    renderMessage('ai', reply);
    updateTokenCount();
  } catch (e) {
    removeTyping();
    // 실패 시 마지막 유저 메시지 히스토리에서 제거
    sess.messages.pop();
    renderMessage('ai', '⚠️ 연결 오류가 발생했어요. 잠시 후 다시 시도해주세요.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

// 초기 세션 생성
newChat();
</script>
</body>
</html>
